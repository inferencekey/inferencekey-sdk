# cbindgen config — generates the public C header `inferencekey.h`.
# Run in CI:  cbindgen --config cbindgen.toml --crate inferencekey-capi --output include/inferencekey.h
language = "C"
header = "/* InferenceKey SDK — C ABI. Generated by cbindgen; do not edit. */"
include_guard = "INFERENCEKEY_H"
autogen_warning = "/* This file is auto-generated. Edits will be overwritten. */"
tab_width = 4
style = "type"
cpp_compat = true

[export]
prefix = "Ik"
# Only the `ik_*` extern "C" functions and the status-code constants are public.

[parse]
parse_deps = false

[fn]
sort_by = "Name"
