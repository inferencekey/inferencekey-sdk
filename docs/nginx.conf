# Static serving for the Starlight docs build. Pretty URLs (no .html), gzip,
# long-lived caching for hashed assets, and a 404 fallback to Starlight's page.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed Astro assets are immutable — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pretty URLs: try the path, then path/, then path.html, then 404.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }
}
